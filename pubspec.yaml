name: bookverse
description: "Modern Book Store & Library App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.2.1

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  # Google Sign In
  google_sign_in: ^6.3.0

  shared_preferences: ^2.5.3


  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.9.0
  connectivity_plus: ^7.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  http: ^1.6.0
  image_picker: ^1.2.3
  image: ^4.9.1
  file_picker: ^10.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6



flutter:
  uses-material-design: true

  assets:
    - assets/images/onboarding/
    - assets/icons/
    - assets/animations/
    - assets/json/
    - assets/logo/
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/app_logo.png"
  min_sdk_android: 21
flutter_native_splash:
  color: "#6D0022"
  image: assets/logo/app_logo.png

  android: true
  ios: false

  android_12:
    color: "#6D0022"
    image: assets/logo/app_logo.png